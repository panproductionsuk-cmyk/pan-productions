  <body style="background-color: hsl(220, 18%, 18%)">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- AlwaysBooked Chat Widget -->
    <style>
      .alwaysbooked-chat-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 9999;
      }
      .alwaysbooked-chat-button {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .alwaysbooked-chat-button:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
      }
      .alwaysbooked-chat-button svg {
        width: 28px;
        height: 28px;
        fill: white;
      }
      .alwaysbooked-chat-iframe-container {
        display: none;
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 400px;
        height: 600px;
        max-width: calc(100vw - 40px);
        max-height: calc(100vh - 120px);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 9998;
      }
      .alwaysbooked-chat-iframe-container.open {
        display: block;
      }
      .alwaysbooked-chat-iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
      .alwaysbooked-chat-close {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.5);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 18px;
        z-index: 10;
      }
      @media (max-width: 480px) {
        .alwaysbooked-chat-iframe-container {
          bottom: 0;
          right: 0;
          width: 100vw;
          height: 100vh;
          max-width: 100vw;
          max-height: 100vh;
          border-radius: 0;
        }
        .alwaysbooked-chat-button {
          bottom: 15px;
          right: 15px;
        }
      }
    </style>
    <div class="alwaysbooked-chat-widget">
      <button class="alwaysbooked-chat-button" onclick="toggleAlwaysBookedChat()" aria-label="Open chat">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </svg>
      </button>
    </div>
    <div class="alwaysbooked-chat-iframe-container" id="alwaysbooked-chat-container">
      <button class="alwaysbooked-chat-close" onclick="toggleAlwaysBookedChat()" aria-label="Close chat">&times;</button>
      <iframe 
        class="alwaysbooked-chat-iframe" 
        src="https://alwaysbooked.uk/chat/pan-productions"
        title="Chat with Pan Productions"
        loading="lazy"
      ></iframe>
    </div>
    <script>
      function toggleAlwaysBookedChat() {
        const container = document.getElementById('alwaysbooked-chat-container');
        container.classList.toggle('open');
      }
      // Allow external trigger from the Contact page button
      window.openAlwaysBookedChat = function() {
        const container = document.getElementById('alwaysbooked-chat-container');
        container.classList.add('open');
      };
    </script>
  </body>
</html>
